shell:
 program: /bin/zsh
 args:
   - --login
   - --interactive

cursor:
  style:
    shape: Beam
    blinking: On
  blink_interval: 500
  thickness: 0.10

font:
  size: 13.0
  offset:
    y: 5

selection:
  save_to_clipboard: false

window:
  dimensions:
    columns: 80
    lines: 24
  padding:
    x: 10
    y: 10
  opacity: 0.90
  dynamic_title: true
  decorations_theme_variant: Dark
  resize_increments: true

draw_bold_text_with_bright_colors: true
