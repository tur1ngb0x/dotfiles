format = """\
${custom.os}\
$line_break\
$time\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$line_break\
$character\
"""

[custom.os]
disabled = false
command = 'source /etc/os-release; echo "${ID}-${VERSION_ID}"'
format = '[$output](white) '
shell = ['bash', '-c']
use_stdin = false

[time]
disabled = false
format = '[$time](yellow)'
time_format = '%Y-%m-%d %a %H:%M:%S '

[username]
disabled = false
format = '[$user](cyan)'
show_always = true

[hostname]
disabled = false
format = '[@$hostname](cyan) '
ssh_only = false

[directory]
disabled = false
format = '[$path](green) '
truncate_to_repo = false
truncation_length = 0

[git_branch]
disabled = false
always_show_remote = true
format = '[$branch](yellow) '

[git_status]
disabled = false
format = '[$all_status$ahead_behind](red) '

[character]
disabled = false
format = '[$symbol](green) '
success_symbol = '[\$](white)'
error_symbol =  '[\$](red)'
