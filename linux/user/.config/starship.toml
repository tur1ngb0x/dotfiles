format = """\
${custom.os}\
$time\
$line_break\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$line_break\
$character\
"""

[custom.os]
disabled = false
command = 'source /etc/os-release; echo "${ID}-${VERSION_ID}"'
format = '[$output](dimmed white) '
shell = ['bash', '-c']
use_stdin = false
when = true

[time]
disabled = false
format = '[$time](dimmed white)'
time_format = '%Y-%m-%d_%H:%M:%S'

[username]
disabled = false
format = '[$user](bright-cyan)'
show_always = true

[hostname]
disabled = false
format = '[@$hostname](bright-cyan) '
ssh_only = false

[directory]
disabled = false
format = '[$path](bright-green) '
truncate_to_repo = false
truncation_length = 0

[git_branch]
disabled = false
always_show_remote = true
format = '[$branch](bright-yellow) '

[git_status]
disabled = false
format = '[$all_status$ahead_behind](bright-red) '

[character]
disabled = false
success_symbol = '[\$](white)'
error_symbol =  '[\$](red)'
